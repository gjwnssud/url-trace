name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      # ubuntu-24.04 restricts unprivileged user namespaces, which crashes
      # Chrome's sandbox (ZygoteHostImpl::Init). Relax it so the chromedp
      # browser integration test can run for real instead of being skipped.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: go test ./...
