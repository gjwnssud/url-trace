name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      # GitHub's ubuntu runners ship Google Chrome, so the chromedp browser
      # integration test runs for real here instead of being skipped.
      - run: go test ./...
