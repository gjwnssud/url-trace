name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      # Regression guard for the Chrome extension's WASM bridge (wasm/) —
      # it only compiles under GOOS=js GOARCH=wasm, so the default build
      # above never touches it.
      - run: GOOS=js GOARCH=wasm go build -o /tmp/url-trace.wasm ./wasm
      # ubuntu-24.04 restricts unprivileged user namespaces, which crashes
      # Chrome's sandbox (ZygoteHostImpl::Init). Relax it so the chromedp
      # browser integration test can run for real instead of being skipped.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: go test ./...

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
        working-directory: extension
      - run: npm run typecheck
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - run: npm run verify:wasm
        working-directory: extension
